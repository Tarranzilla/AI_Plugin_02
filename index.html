<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Espalhar Ícones</title>
    <script src="CSInterface.js"></script>
    <style>
        body { background-color: #323232; color: #ffffff; font-family: Arial, sans-serif; padding: 15px; font-size: 13px; }
        
        /* Área de Status e Feedback */
        #statusArea { background: #252525; padding: 10px; border-radius: 5px; border: 1px solid #444; margin-bottom: 15px; }
        #statusArea div { margin-bottom: 5px; }
        .highlight { color: #4CAF50; font-weight: bold; }
        #errorConsole { color: #ff5555; background: #3a1111; padding: 8px; border-radius: 4px; margin-top: 10px; display: none; font-weight: bold; text-align: center; border: 1px solid #ff0000; }
        
        .step-title { display: block; margin-top: 15px; margin-bottom: 8px; font-weight: bold; }
        .control-group { margin-bottom: 12px; }
        .control-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; background: #252525; padding: 8px; border-radius: 4px; }
        
        input[type="number"] { width: 60px; padding: 4px; background: #535353; color: white; border: 1px solid #222; border-radius: 3px; text-align: right; }
        
        button { background-color: #2196F3; color: white; border: none; padding: 10px; width: 100%; cursor: pointer; border-radius: 4px; font-weight: bold; margin-top: 10px; }
        button:hover { background-color: #1976D2; }
        .btn-secondary { background-color: #555555; margin-top: 5px; padding: 6px; }
        .btn-secondary:hover { background-color: #666666; }
        
        .checkbox-container { display: flex; align-items: center; margin-top: 10px; cursor: pointer; }
        .checkbox-container input { margin-right: 8px; }
    </style>
</head>
<body>
    <div id="statusArea">
        <div style="font-size: 11px; color: #aaa; text-transform: uppercase;">Leitura da Tela:</div>
        <div id="lblSelection">Ícones selecionados: <span class="highlight">0</span></div>
        <div id="lblArtboard">Prancheta ativa: <span class="highlight">Nenhuma</span></div>
        <button id="btnRefresh" class="btn-secondary">🔄 Atualizar Leitura</button>
    </div>

    <div class="step-title" style="margin-top: 0;">Ajustes de Espalhamento</div>
    <div class="control-group">
        <div class="control-row">
            <label>Qtd. de Ícones:</label>
            <input type="number" id="inpCount" value="80" min="1" max="500">
        </div>
        <div class="control-row">
            <label>Margem (Anti-Colisão):</label>
            <input type="number" id="inpMargin" value="5" min="0" max="50">
        </div>
        <div class="control-row">
            <label>Escala Mínima (%):</label>
            <input type="number" id="inpScaleMin" value="50" min="10" max="200">
        </div>
        <div class="control-row">
            <label>Escala Máxima (%):</label>
            <input type="number" id="inpScaleMax" value="120" min="10" max="300">
        </div>
    </div>

    <label class="checkbox-container"><input type="checkbox" id="chkRotate" checked> Rotação (0º a 360º)</label>
    <label class="checkbox-container"><input type="checkbox" id="chkDebug"> Mostrar Caixas (Debug)</label>

    <div id="errorConsole"></div>

    <button id="btnScatter">✨ Espalhar na Prancheta</button>

    <script src="main.js"></script>
</body>
</html>
